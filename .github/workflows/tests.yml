name: Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --junitxml=report.xml --cov=app --cov-report=term-missing

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-backend
          path: backend/report.xml

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --junitxml=report.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-cli
          path: cli/report.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=junit --reporter=default --outputFile=report.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-frontend
          path: frontend/report.xml

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: frontend/test-results/

  report:
    needs: [backend, cli, frontend, e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Initialize git for test reporter
        run: |
          git init
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add -A
          git commit --allow-empty -m "ci"

      - name: Publish backend results
        id: backend
        uses: dorny/test-reporter@v3
        continue-on-error: true
        with:
          name: Backend Tests (pytest)
          path: artifacts/test-report-backend/report.xml
          reporter: java-junit
          fail-on-error: "false"

      - name: Publish CLI results
        id: cli
        uses: dorny/test-reporter@v3
        continue-on-error: true
        with:
          name: CLI Tests (pytest)
          path: artifacts/test-report-cli/report.xml
          reporter: java-junit
          fail-on-error: "false"

      - name: Publish frontend results
        id: frontend
        uses: dorny/test-reporter@v3
        continue-on-error: true
        with:
          name: Frontend Tests (vitest)
          path: artifacts/test-report-frontend/report.xml
          reporter: java-junit
          fail-on-error: "false"

      - name: Publish E2E results
        id: e2e
        uses: dorny/test-reporter@v3
        continue-on-error: true
        with:
          name: E2E Tests (Playwright)
          path: artifacts/playwright-report/report.xml
          reporter: java-junit
          fail-on-error: "false"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const suites = [
              { label: 'Backend (pytest)',  prefix: 'backend' },
              { label: 'CLI (pytest)',      prefix: 'cli' },
              { label: 'Frontend (vitest)', prefix: 'frontend' },
              { label: 'E2E (Playwright)',  prefix: 'e2e' },
            ];

            const sha = context.sha;
            const shaLink = `[\`${sha.slice(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${sha})`;

            let lines = [];
            let totalPassed = 0, totalFailed = 0, totalSkipped = 0;

            for (const s of suites) {
              const step = steps[s.prefix];
              const passed     = parseInt(step?.outputs?.passed     ?? '0');
              const failed     = parseInt(step?.outputs?.failed     ?? '0');
              const skipped    = parseInt(step?.outputs?.skipped    ?? '0');
              const conclusion = step?.outputs?.conclusion ?? 'skipped';
              const total      = passed + failed + skipped;
              totalPassed  += passed;
              totalFailed  += failed;
              totalSkipped += skipped;

              const emoji = conclusion === 'success' ? '✅' : conclusion === 'failure' ? '❌' : '⏭️';
              lines.push(`${emoji} **${s.label}** — ${passed} passed, ${failed} failed, ${skipped} skipped (${total} total)`);
            }

            const total = totalPassed + totalFailed + totalSkipped;
            const header = `## 🧪 Test Results — ${shaLink}\n\n`;
            const footer = `\n**Summary:** ${totalPassed} ✅ passed, ${totalFailed} ❌ failed, ${totalSkipped} ⏭️ skipped (${total} total)`;
            const body = header + lines.join('\n') + footer;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
